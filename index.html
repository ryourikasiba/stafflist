<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>従業員管理＆労働条件通知書システム</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="max-w-4xl mx-auto p-6">
        <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-8 border-b-2 border-blue-500 pb-2 no-print">
            <h1 class="text-3xl font-bold text-blue-900">従業員管理 ＆ 労働条件通知書</h1>
            <a href="list.html" class="mt-4 md:mt-0 inline-flex items-center bg-blue-100 hover:bg-blue-200 text-blue-800 font-bold py-2 px-4 rounded-md border border-blue-300 transition shadow-xs">
                📋 従業員名簿（一覧ページ）を開く
            </a>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200 no-print">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">従業員情報の入力</h2>
            <form id="employeeForm" class="space-y-6">
                <input type="hidden" id="empFirebaseId">
                
                <div>
                    <h3 class="text-sm font-bold text-blue-600 uppercase tracking-wider mb-2">1. 基本情報</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-600">氏名</label>
                            <input type="text" id="empName" required class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none" placeholder="山田 太郎">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600">生年月日</label>
                            <input type="date" id="empBirth" required class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-medium text-gray-600">住所</label>
                            <input type="text" id="empAddress" required class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none" placeholder="東京都千代田区...">
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-blue-600 uppercase tracking-wider mb-2">2. 配属・契約情報（法改正対応）</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-600">所属会社</label>
                            <select id="empDept" class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none font-medium bg-blue-50">
                                <option value="株式会社料理かしば">株式会社料理かしば</option>
                                <option value="株式会社山下食品">株式会社山下食品</option>
                                <option value="有限会社CSカンパニー">有限会社CSカンパニー</option>
                                <option value="有限会社村井食品">有限会社村井食品</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600">就業場所</label>
                            <input type="text" id="workPlace" required class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none" value="本社工場">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-medium text-gray-600">【2024法改正対応】就業場所・業務の「変更の範囲」</label>
                            <input type="text" id="changeScope" required class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none" value="就業場所：変更なし ／ 従事すべき業務：変更なし">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-medium text-gray-600">契約期間・更新ルール</label>
                            <textarea id="contractPeriod" rows="2" class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none">期間の定めなし（正社員・無期契約）</textarea>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-blue-600 uppercase tracking-wider mb-2">3. 労働条件</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border p-4 rounded-md bg-gray-50 mb-4">
                        <div class="md:col-span-2"><p class="text-xs font-bold text-gray-500">【就業時刻】</p></div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-medium text-gray-600">就業時間 パターン①</label>
                            <input type="text" id="workHours1" class="w-full mt-1 p-2 border rounded-md bg-white outline-none focus:ring-2 focus:ring-blue-400" value="08
